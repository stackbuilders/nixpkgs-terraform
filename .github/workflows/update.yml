      #       Automatically created pull-request to update OpenTofu/Terraform versions.

      #       This is the result of configuring a CLI_GITHUB_TOKEN in `.env` and running:

      #       ```
      #       cd cli
      #       ${{ matrix.update.command }}
      #       ```
