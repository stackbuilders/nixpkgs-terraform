---
name: Update

on: push
  # workflow_dispatch:
  # schedule:
  #   - cron: "0 0 * * *"

concurrency:
  group: update
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        # with:
        #   nix_path: nixpkgs=channel:nixpkgs-unstable
      # - uses: cachix/cachix-action@v16
      #   with:
      #     name: devenv
      - run: nix profile install nixpkgs#devenv
      - run: |
           devenv shell nix-prefetch -- \
             --option extra-experimental-features flakes \
             --file ../opentofu.nix \
             --argstr version "1.10.0" \
             --argstr hash "sha256-4/Z09iJK37ofWKLQ9+uUitkcGfMBTYzunOOeDZjrDOM="
        working-directory: cli

    
  update:
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    strategy:
      matrix:
        update:
          - command: >-
              go run . update
              --tool-name OpenTofu
              --owner opentofu
              --repo opentofu
              --min-version 1.6.0
              --versions ../opentofu.json
              --vendor-hash ../opentofu.nix
          - command: >-
              go run . update
              --tool-name Terraform
              --owner hashicorp
              --repo terraform
              --min-version 1.0.0
              --versions ../terraform.json
              --vendor-hash ../terraform.nix
              --templates-dir ../templates
      fail-fast: false
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Create GH App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - name: Checkout code
        uses: actions/checkout@v5
        # with:
        #   ref: main
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Install devenv
        run: nix profile add --accept-flake-config github:cachix/devenv/latest
      - name: Update versions
        id: update
        run: |
          commit_message=$(devenv shell -- ${{ matrix.update.command }})
          echo "commit_message=$commit_message" >> "$GITHUB_OUTPUT"
        env:
          CLI_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: git diff
      # - name: Create pull request
      #   if: ${{ steps.update.outputs.commit_message }}
      #   uses: peter-evans/create-pull-request@v7
      #   with:
      #     commit-message: ${{ steps.update.outputs.commit_message }}
      #     title: ${{ steps.update.outputs.commit_message }}
